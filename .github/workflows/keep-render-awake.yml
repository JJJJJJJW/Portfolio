name: Keep Render Awake

on:
  schedule:
    # Everyday at 9:00 AM (1:00 UTC) and 12:00 AM midnight (16:00 UTC) local time (UTC+8)
    - cron: "0 0-1,15-16 * * *"

  # Allows you to run it manually from GitHub
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Wake Render
        run: |
          curl \
            --location \
            --request GET \
            --connect-timeout 20 \
            --max-time 120 \
            --retry 2 \
            --retry-delay 5 \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/137.0 Safari/537.36" \
            "https://acetechfolio.onrender.com/api/v1/ping"
