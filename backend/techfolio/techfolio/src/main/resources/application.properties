spring.application.name=techfolio

# =============================================================================
# Server Configuration
# =============================================================================
server.port=8080

# =============================================================================
# Supabase PostgreSQL Connection
# Uses the Transaction Pooler (port 6543) for efficient connection management.
# Variables are loaded from .env via spring-dotenv (dev) or OS env vars (prod).
# =============================================================================
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# =============================================================================
# HikariCP Connection Pool Tuning (Crucial for 512MB Render free tier)
# =============================================================================
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=600000

# =============================================================================
# Hibernate / JPA Settings
# =============================================================================
# Use 'update' for dev (auto-creates tables); switch to 'validate' or Flyway for production
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Prevent open-in-view anti-pattern (reduces memory & connection leakage)
spring.jpa.open-in-view=false

# =============================================================================
# Security & JWT Configuration
# =============================================================================
# Maps to SUPABASE_JWT_SECRET loaded from environment variables
techfolio.jwt.secret=${SUPABASE_JWT_SECRET}