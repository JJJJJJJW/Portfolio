spring.application.name=techfolio

# =============================================================================
# Server Configuration
# =============================================================================
server.port=8080

# =============================================================================
# Supabase PostgreSQL Connection
# Uses the Transaction Pooler (port 6543) for efficient connection management.
# Variables are loaded from .env via spring-dotenv (dev) or OS env vars (prod).
# =============================================================================
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# =============================================================================
# HikariCP Connection Pool Tuning (Crucial for 512MB Render free tier)
# =============================================================================
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=600000

# =============================================================================
# Hibernate / JPA Settings
# =============================================================================
# Use 'update' for dev (auto-creates tables); switch to 'validate' or Flyway for production
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Prevent open-in-view anti-pattern (reduces memory & connection leakage)
spring.jpa.open-in-view=false

# =============================================================================
# Security & JWT Configuration
# =============================================================================
# Supabase project URL — used to construct the JWKS endpoint for ES256 JWT validation
techfolio.supabase.url=${SUPABASE_URL}
# Supabase anon key — required as 'apikey' header when fetching the JWKS public keys
techfolio.supabase.anon-key=${SUPABASE_ANON_KEY}

# =============================================================================
# Logging Configuration
# =============================================================================
# Write logs to file (in addition to console)
logging.file.name=logs/techfolio.log

# Roll the log file at 10MB, keep 7 days of history (safe for 512MB RAM tier)
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7
logging.logback.rollingpolicy.total-size-cap=50MB

# Log levels: your app code at DEBUG, everything else at INFO
logging.level.root=INFO
logging.level.com.ace.techfolio=DEBUG

# Log pattern with timestamp, level, thread, logger, and message
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# =============================================================================
# Stock Analyzer Configuration
# =============================================================================
stock-analyzer.security.cron-secret=${CRON_SECRET:}

stock-analyzer.openai.api-key=${OPENAI_API_KEY:}
stock-analyzer.openai.model=gpt-4o-mini
stock-analyzer.openai.temperature=0.2
stock-analyzer.openai.max-tokens=500

stock-analyzer.polygon.api-key=${POLYGON_API_KEY:}
stock-analyzer.polygon.base-url=https://api.polygon.io

stock-analyzer.fred.api-key=${FRED_API_KEY:}
stock-analyzer.fred.base-url=https://api.stlouisfed.org/fred

stock-analyzer.finnhub.api-key=${FINNHUB_API_KEY:}
stock-analyzer.finnhub.base-url=https://finnhub.io/api/v1

stock-analyzer.screening.min-volume=500000
stock-analyzer.screening.rsi-min=30
stock-analyzer.screening.rsi-max=55
stock-analyzer.screening.require-above-200sma=true

stock-analyzer.watchlist.max-tickers=50