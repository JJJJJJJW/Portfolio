spring.application.name=techfolio

# =============================================================================
# Server Configuration
# =============================================================================
server.port=8080

# =============================================================================
# Supabase PostgreSQL Connection
# Uses the Transaction Pooler (port 6543) for efficient connection management.
# Variables are loaded from .env via spring-dotenv (dev) or OS env vars (prod).
# =============================================================================
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# =============================================================================
# HikariCP Connection Pool Tuning (Crucial for 512MB Render free tier)
# =============================================================================
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=600000
# Allow the app to start even if the first DB connection is slow during cold start.
# -1 = don't fail fast; the pool will keep retrying in the background.
spring.datasource.hikari.initialization-fail-timeout=-1

# =============================================================================
# Hibernate / JPA Settings
# =============================================================================
# 'none' = skip schema diffing on startup (saves ~26s cold start).
# Schema is managed by Supabase migrations — Hibernate should not alter tables.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
# Hibernate 7+ auto-detects PostgreSQLDialect — no need to set it explicitly.

# Prevent open-in-view anti-pattern (reduces memory & connection leakage)
spring.jpa.open-in-view=false

# Defer JPA repository proxy creation to first use (shaves seconds off startup).
spring.data.jpa.repositories.bootstrap-mode=lazy

# =============================================================================
# Security & JWT Configuration
# =============================================================================
# Supabase project URL — used to construct the JWKS endpoint for ES256 JWT validation
techfolio.supabase.url=${SUPABASE_URL}
# Supabase anon key — required as 'apikey' header when fetching the JWKS public keys
techfolio.supabase.anon-key=${SUPABASE_ANON_KEY}

# =============================================================================
# Logging Configuration
# =============================================================================
# Write logs to file (in addition to console)
logging.file.name=logs/techfolio.log

# Roll the log file at 10MB, keep 7 days of history (safe for 512MB RAM tier)
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7
logging.logback.rollingpolicy.total-size-cap=50MB

# Log levels: your app code at DEBUG, everything else at INFO
logging.level.root=INFO
logging.level.com.ace.techfolio=DEBUG

# Log pattern with timestamp, level, thread, logger, and message
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# =============================================================================
# Stock Analyzer Configuration
# =============================================================================
stock-analyzer.security.cron-secret=${CRON_SECRET:}



stock-analyzer.gemini.api-key=${GEMINI_API_KEY:}
stock-analyzer.gemini.model=gemini-3.5-flash
stock-analyzer.gemini.fallback-model=gemini-3-flash-preview
stock-analyzer.gemini.temperature=0.2
stock-analyzer.gemini.max-tokens=1000

stock-analyzer.polygon.api-key=${POLYGON_API_KEY:}
stock-analyzer.polygon.base-url=${POLYGON_BASE_URL:https://api.massive.com}


stock-analyzer.fred.api-key=${FRED_API_KEY:}
stock-analyzer.fred.base-url=https://api.stlouisfed.org/fred

stock-analyzer.finnhub.api-key=${FINNHUB_API_KEY:}
stock-analyzer.finnhub.base-url=https://finnhub.io/api/v1

stock-analyzer.screening.min-volume=500000
stock-analyzer.screening.rsi-min=30
stock-analyzer.screening.rsi-max=55
stock-analyzer.screening.require-above-200sma=true

stock-analyzer.watchlist.max-tickers=50

# =============================================================================
# PGMQ Queue Configuration
# =============================================================================
stock-analyzer.queue.consumer-enabled=true
stock-analyzer.queue.poll-interval-ms=5000
stock-analyzer.queue.visibility-timeout-sec=120
stock-analyzer.queue.max-retries=3
stock-analyzer.queue.dlq-retry-interval-ms=3600000

# =============================================================================
# BUY Signal Notification Configuration
# =============================================================================
stock-analyzer.notification.enabled=true
stock-analyzer.notification.email-to=${NOTIFICATION_EMAIL_TO:}
stock-analyzer.notification.email-from=${MAIL_USERNAME:noreply@techfolio.app}
stock-analyzer.notification.buy-confidence-threshold=70

# =============================================================================
# Spring Mail (Gmail SMTP for BUY signal alerts)
# =============================================================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true